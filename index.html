<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.5.4/papaparse.min.js"></script>
</head>

<body>
  <a href="https://github.com/dirkarnez/csv-repl" target="_blank">dirkarnez/csv-repl</a><br>
  <input type="file" id="input" multiple><br>
  <label for="checkbox-has-header">Has header?</label>
  <input type="checkbox" id="checkbox-has-header"><br>
  <script>
    let globalObj = undefined;
    const readCSVText = file => new Promise((resolve) => {
        const reader = new FileReader();

        reader.onload = (event) => {
            resolve({
              fileName: file.name.substr(0, file.name.lastIndexOf(".")), 
              content: event.target.result,
              data: Papa.parse(event.target.result, { header: document.getElementById("checkbox-has-header").checked, skipEmptyLines: true }) 
            })
        }
        reader.readAsText(file)
    });

    const inputElement = document.getElementById("input");
    inputElement.addEventListener("change", function () {
      const fileList = this.files;
        Promise
        .all(
            Array
            .from(fileList)
            .map(file => readCSVText(file)))
        .then(obj => {
            globalObj = obj;
            console.table(globalObj);
        });
    }, false);
  </script>
</body>

</html>
